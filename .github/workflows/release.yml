name: Release

# On a version tag (e.g. v0.1.0):
#   1. lint + test + build sdist/wheel,
#   2. publish a GitHub Release with auto-generated notes + artifacts,
#   3. publish to PyPI via Trusted Publishing (OIDC - no API tokens stored).
#
#   git tag -a v0.1.0 -m "v0.1.0"
#   git push origin v0.1.0
#
# One-time PyPI setup (see README "Releasing"): register this repo + the
# "pypi" environment as a Trusted Publisher at
# https://pypi.org/manage/account/publishing/

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    permissions:
      contents: write  # create the GitHub Release
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so we can diff against the previous tag

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Create virtual environment
        run: uv venv --python 3.12

      - name: Install project (with dev extras)
        run: uv pip install -e ".[dev]" build

      - name: Lint
        run: uv run ruff check garmin_mcp_server tests

      - name: Test
        run: uv run pytest

      - name: Build sdist and wheel
        run: uv run python -m build

      - name: Verify version matches the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(uv run python -c 'import garmin_mcp_server; print(garmin_mcp_server.__version__)')"
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag ($TAG) does not match package version ($PKG)"
            exit 1
          fi

      - name: Generate release notes
        run: |
          set -euo pipefail
          CURRENT="${GITHUB_REF_NAME}"
          PREV="$(git describe --tags --abbrev=0 "${CURRENT}^" 2>/dev/null || true)"
          # Only user-facing commits (feat/fix) go in the notes; strip the
          # conventional-commit prefix. CI/chore/docs/etc. are omitted.
          changelog() {
            git log --pretty=format:'%s (%h)' "$@" \
              | grep -E '^(feat|fix)(\([^)]*\))?!?: ' \
              | sed -E 's/^(feat|fix)(\([^)]*\))?!?: /- /'
          }
          {
            echo "## What's changed in ${CURRENT}"
            echo
            if [ -n "$PREV" ]; then
              lines="$(changelog "${PREV}..${CURRENT}")"
              [ -n "$lines" ] && { echo "$lines"; echo; echo; }
              echo "**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${CURRENT}"
            else
              echo "First release."
              echo
              changelog
            fi
          } > RELEASE_NOTES.md
          echo "Generated release notes:"
          cat RELEASE_NOTES.md

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.whl
            dist/*.tar.gz
          fail_on_unmatched_files: true

  pypi-publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/garmin-mcp-server
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          # Attestations require OIDC (id-token: write); disable them when
          # authenticating with an API token instead of Trusted Publishing.
          attestations: false
